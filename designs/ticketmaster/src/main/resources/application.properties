spring.application.name=ticketmaster

spring.datasource.url=jdbc:h2:mem:ticketmasterdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

ticketmaster.booking.hold-duration-minutes=10
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
server.compression.min-response-size=1024
server.http2.enabled=true
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
server.tomcat.threads.max=240
server.tomcat.accept-count=1000
server.tomcat.max-connections=8192
